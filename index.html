<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Central de Iluminação IoT - 3 LEDs</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(145deg, #e8f4fd 0%, #f5faff 50%, #e8f4fd 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      margin: 0;
    }
    
    .glass-card {
      background: rgba(255, 255, 255, 0.45);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 30px 60px -20px rgba(0, 40, 80, 0.15), 
                  inset 0 1px 2px rgba(255, 255, 255, 0.8);
      transition: box-shadow 0.4s ease;
    }
    
    .glass-card:hover {
      box-shadow: 0 40px 80px -20px rgba(0, 40, 80, 0.25),
                  inset 0 1px 2px rgba(255, 255, 255, 0.8);
    }
    
    .led-circle {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #c8d8e8;
      box-shadow: inset 0 4px 12px rgba(0,0,0,0.06);
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 400;
      letter-spacing: 0.2px;
      color: #4a6a8a;
      font-size: 0.7rem;
      margin: 0 auto;
      position: relative;
    }
    
    .led-on {
      background: #0a8cff;
      box-shadow: 0 0 40px rgba(10, 140, 255, 0.4),
                  0 0 80px rgba(10, 140, 255, 0.2),
                  inset 0 2px 4px rgba(255, 255, 255, 0.3);
      color: white;
      text-shadow: 0 0 20px rgba(255,255,255,0.3);
      animation: pulse-glow 2.5s ease-in-out infinite;
    }
    
    @keyframes pulse-glow {
      0%, 100% { 
        box-shadow: 0 0 30px rgba(10, 140, 255, 0.4),
                    0 0 60px rgba(10, 140, 255, 0.2),
                    inset 0 2px 4px rgba(255, 255, 255, 0.3);
      }
      50% { 
        box-shadow: 0 0 50px rgba(10, 140, 255, 0.6),
                    0 0 100px rgba(10, 140, 255, 0.3),
                    inset 0 2px 4px rgba(255, 255, 255, 0.4);
      }
    }
    
    .led-off {
      background: #c8d8e8;
      box-shadow: inset 0 4px 12px rgba(0,0,0,0.06);
      color: #4a6a8a;
    }
    
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 0.5rem 1.4rem 0.5rem 1.2rem;
      border-radius: 100px;
      background: rgba(255,255,255,0.35);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.5);
      font-size: 0.85rem;
      font-weight: 500;
      transition: all 0.3s ease;
    }
    
    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
      transition: all 0.4s ease;
    }
    
    .dot-waiting {
      background: #fbbf24;
      box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.6);
      animation: pulse-dot 1.6s ease-in-out infinite;
    }
    
    .dot-online {
      background: #10b981;
      box-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
    }
    
    .dot-offline {
      background: #ef4444;
      box-shadow: 0 0 20px rgba(239, 68, 68, 0.3);
    }
    
    @keyframes pulse-dot {
      0%, 100% { 
        box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.5);
        transform: scale(1);
      }
      50% { 
        box-shadow: 0 0 0 10px rgba(251, 191, 36, 0);
        transform: scale(0.9);
      }
    }
    
    .topic-input {
      background: rgba(255,255,255,0.5);
      backdrop-filter: blur(4px);
      border: 1.5px solid rgba(255,255,255,0.6);
      border-radius: 100px;
      padding: 0.65rem 1.5rem;
      width: 100%;
      font-size: 0.9rem;
      transition: all 0.3s ease;
      color: #1a2a3a;
      font-family: 'Inter', monospace;
      letter-spacing: 0.3px;
    }
    
    .topic-input:focus {
      outline: none;
      border-color: #6ea8fe;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.08);
      background: rgba(255,255,255,0.7);
    }
    
    .topic-input::placeholder {
      color: #8aa3c0;
      font-weight: 300;
    }
    
    .btn-action {
      padding: 0.7rem 1.8rem;
      border-radius: 100px;
      font-weight: 500;
      font-size: 0.85rem;
      letter-spacing: 0.3px;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      border: none;
      background: #e8edf5;
      color: #2a3a4a;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      flex: 1;
      min-width: 90px;
      text-align: center;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }
    
    .btn-action:active {
      transform: scale(0.94);
    }
    
    .btn-action:disabled {
      opacity: 0.35;
      pointer-events: none;
      filter: grayscale(0.3);
    }
    
    .btn-on {
      background: linear-gradient(135deg, #0b9e6e, #0a8a5f);
      color: white;
      box-shadow: 0 4px 16px rgba(11, 158, 110, 0.25);
    }
    
    .btn-on:hover:not(:disabled) {
      box-shadow: 0 6px 24px rgba(11, 158, 110, 0.35);
      transform: translateY(-2px);
    }
    
    .btn-off {
      background: linear-gradient(135deg, #d16b6b, #bf5a5a);
      color: white;
      box-shadow: 0 4px 16px rgba(209, 107, 107, 0.2);
    }
    
    .btn-off:hover:not(:disabled) {
      box-shadow: 0 6px 24px rgba(209, 107, 107, 0.3);
      transform: translateY(-2px);
    }
    
    .btn-all-on {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      box-shadow: 0 4px 16px rgba(59, 130, 246, 0.25);
    }
    
    .btn-all-on:hover:not(:disabled) {
      box-shadow: 0 6px 24px rgba(59, 130, 246, 0.35);
      transform: translateY(-2px);
    }
    
    .btn-all-off {
      background: linear-gradient(135deg, #8b8b8b, #6b6b6b);
      color: white;
      box-shadow: 0 4px 16px rgba(107, 107, 107, 0.2);
    }
    
    .btn-all-off:hover:not(:disabled) {
      box-shadow: 0 6px 24px rgba(107, 107, 107, 0.3);
      transform: translateY(-2px);
    }
    
    .led-card {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 1.5rem;
      padding: 1.25rem 1rem;
      transition: all 0.3s ease;
    }
    
    .led-card:hover {
      background: rgba(255,255,255,0.25);
      border-color: rgba(255,255,255,0.4);
    }
    
    @media (max-width: 640px) {
      .led-circle {
        width: 60px;
        height: 60px;
        font-size: 0.6rem;
      }
      .btn-action {
        padding: 0.5rem 1rem;
        min-width: 70px;
        font-size: 0.75rem;
      }
      .glass-card {
        padding: 1.5rem;
      }
    }
    
    /* Scrollbar personalizada */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(0,0,0,0.1);
      border-radius: 10px;
    }
  </style>
</head>
<body>

<div class="w-full max-w-4xl mx-auto px-3">
  <div class="glass-card rounded-3xl p-6 md:p-8 w-full">
    
    <!-- Cabeçalho -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-6">
      <div>
        <h1 class="text-2xl md:text-3xl font-semibold text-[#0b2b44] tracking-tight flex items-center gap-3">
          <span class="text-3xl">💡</span> 
          Central de Iluminação IoT
        </h1>
        <p class="text-sm text-[#4a7a9a] font-light tracking-wide mt-0.5 flex items-center gap-2">
          <span class="opacity-60">⚡</span> Controle de Hardware – 3 LEDs
        </p>
      </div>
      <div id="statusPill" class="status-pill self-start sm:self-center text-[#1f3a57]">
        <span id="statusDot" class="status-dot dot-waiting"></span>
        <span id="statusLabel" class="text-sm font-medium">Sincronizando...</span>
      </div>
    </div>

    <!-- Tópico -->
    <div class="mb-6">
      <label for="topicInput" class="block text-xs font-semibold text-[#3a5a7a] uppercase tracking-wider mb-1.5 ml-1 opacity-70">Tópico MQTT</label>
      <input id="topicInput" type="text" value="gerry_sanchez_led_exclusivo/arduino" 
             class="topic-input text-[#1a2a3a]" spellcheck="false">
      <p class="text-[10px] text-[#5a7a9a] mt-1.5 ml-2 opacity-60 font-light">✎ Edite e pressione Enter para reassinar automaticamente</p>
    </div>

    <!-- 3 LEDs -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-5 mb-6">
      <!-- LED 1 -->
      <div class="led-card">
        <div class="text-xs font-semibold text-[#2a4a6a] text-center uppercase tracking-wider mb-2 opacity-70">LED 1</div>
        <div id="ledCircle1" class="led-circle led-off">
          <span id="ledLabel1" class="text-center px-1 leading-tight">Inativo</span>
        </div>
        <div class="flex gap-2 mt-3">
          <button id="btnOn1" class="btn-action btn-on" disabled>Ligar</button>
          <button id="btnOff1" class="btn-action btn-off" disabled>Desligar</button>
        </div>
      </div>

      <!-- LED 2 -->
      <div class="led-card">
        <div class="text-xs font-semibold text-[#2a4a6a] text-center uppercase tracking-wider mb-2 opacity-70">LED 2</div>
        <div id="ledCircle2" class="led-circle led-off">
          <span id="ledLabel2" class="text-center px-1 leading-tight">Inativo</span>
        </div>
        <div class="flex gap-2 mt-3">
          <button id="btnOn2" class="btn-action btn-on" disabled>Ligar</button>
          <button id="btnOff2" class="btn-action btn-off" disabled>Desligar</button>
        </div>
      </div>

      <!-- LED 3 -->
      <div class="led-card">
        <div class="text-xs font-semibold text-[#2a4a6a] text-center uppercase tracking-wider mb-2 opacity-70">LED 3</div>
        <div id="ledCircle3" class="led-circle led-off">
          <span id="ledLabel3" class="text-center px-1 leading-tight">Inativo</span>
        </div>
        <div class="flex gap-2 mt-3">
          <button id="btnOn3" class="btn-action btn-on" disabled>Ligar</button>
          <button id="btnOff3" class="btn-action btn-off" disabled>Desligar</button>
        </div>
      </div>
    </div>

    <!-- Controles Globais -->
    <div class="flex flex-row flex-wrap items-center justify-center gap-3 sm:gap-4 pt-2 border-t border-white/30">
      <button id="btnAllOn" class="btn-action btn-all-on" disabled>✨ Ligar Todos</button>
      <button id="btnAllOff" class="btn-action btn-all-off" disabled>⚡ Desligar Todos</button>
    </div>

    <!-- Rodapé -->
    <div class="mt-6 text-center text-[10px] text-[#5a7a9a] opacity-40 tracking-wider font-light border-t border-white/30 pt-4">
      <span>broker.hivemq.com • WebSocket Secure • v2.0</span>
    </div>
  </div>
</div>

<script>
  (function() {
    "use strict";

    // DOM refs
    const statusDot = document.getElementById('statusDot');
    const statusLabel = document.getElementById('statusLabel');
    const topicInput = document.getElementById('topicInput');

    // Configuração dos LEDs
    const leds = [
      {
        id: 1,
        circle: document.getElementById('ledCircle1'),
        label: document.getElementById('ledLabel1'),
        btnOn: document.getElementById('btnOn1'),
        btnOff: document.getElementById('btnOff1'),
        state: 0
      },
      {
        id: 2,
        circle: document.getElementById('ledCircle2'),
        label: document.getElementById('ledLabel2'),
        btnOn: document.getElementById('btnOn2'),
        btnOff: document.getElementById('btnOff2'),
        state: 0
      },
      {
        id: 3,
        circle: document.getElementById('ledCircle3'),
        label: document.getElementById('ledLabel3'),
        btnOn: document.getElementById('btnOn3'),
        btnOff: document.getElementById('btnOff3'),
        state: 0
      }
    ];

    const btnAllOn = document.getElementById('btnAllOn');
    const btnAllOff = document.getElementById('btnAllOff');

    let currentTopic = topicInput.value.trim() || 'gerry_sanchez_led_exclusivo/arduino';
    let client = null;
    let isConnected = false;

    // UI Helpers
    function updateLedUI(ledIndex, state) {
      const led = leds[ledIndex];
      if (state === 1) {
        led.circle.classList.remove('led-off');
        led.circle.classList.add('led-on');
        led.label.textContent = `LED ${led.id} Ativo`;
      } else {
        led.circle.classList.remove('led-on');
        led.circle.classList.add('led-off');
        led.label.textContent = `LED ${led.id} Inativo`;
      }
      led.state = state;
    }

    function setStatus(mode, labelText) {
      statusDot.className = 'status-dot';
      if (mode === 'waiting') {
        statusDot.classList.add('dot-waiting');
        statusLabel.textContent = labelText || 'Sincronizando...';
      } else if (mode === 'online') {
        statusDot.classList.add('dot-online');
        statusLabel.textContent = labelText || 'Sistema Online';
      } else if (mode === 'offline') {
        statusDot.classList.add('dot-offline');
        statusLabel.textContent = labelText || 'Desconectado';
      }
    }

    function setButtonsEnabled(enabled) {
      leds.forEach(led => {
        led.btnOn.disabled = !enabled;
        led.btnOff.disabled = !enabled;
      });
      btnAllOn.disabled = !enabled;
      btnAllOff.disabled = !enabled;
    }

    // MQTT
    function connectMQTT() {
      if (client && client.isConnected()) {
        client.disconnect();
      }

      const clientId = 'web_' + Math.random().toString(36).substr(2, 10) + '_' + Date.now();
      client = new Paho.MQTT.Client('broker.hivemq.com', Number(8884), clientId);

      client.onConnectionLost = function(response) {
        isConnected = false;
        setStatus('offline', 'Conexão perdida');
        setButtonsEnabled(false);
        console.warn('MQTT connection lost:', response.errorCode);
        setTimeout(() => {
          if (!isConnected) {
            connectMQTT();
          }
        }, 4000);
      };

      client.onMessageArrived = function(message) {
        const payload = message.payloadString.trim();
        console.log(`📥 Mensagem recebida: ${payload}`);
        
        // Formato esperado: "LED1:1", "LED2:0", "ALL:1", etc.
        const parts = payload.split(':');
        if (parts.length === 2) {
          const target = parts[0].toUpperCase();
          const value = parseInt(parts[1]);
          
          if (!isNaN(value) && (value === 0 || value === 1)) {
            if (target === 'LED1') {
              updateLedUI(0, value);
            } else if (target === 'LED2') {
              updateLedUI(1, value);
            } else if (target === 'LED3') {
              updateLedUI(2, value);
            } else if (target === 'ALL') {
              leds.forEach((_, index) => {
                updateLedUI(index, value);
              });
            }
          }
        }
      };

      const connectOptions = {
        useSSL: true,
        timeout: 10,
        onSuccess: function() {
          isConnected = true;
          setStatus('online', 'Sistema Online');
          setButtonsEnabled(true);
          doSubscribe(currentTopic);
          console.log('✅ Conectado ao broker, clientId:', clientId);
        },
        onFailure: function(err) {
          isConnected = false;
          setStatus('offline', 'Falha na conexão');
          setButtonsEnabled(false);
          console.error('❌ Falha ao conectar:', err.errorMessage);
          setTimeout(connectMQTT, 5000);
        }
      };

      client.connect(connectOptions);
    }

    function doSubscribe(topic) {
      if (!client || !client.isConnected()) return;
      try {
        client.unsubscribe(currentTopic, { 
          onSuccess: function() {
            console.log('📤 Desinscrito do tópico:', currentTopic);
          }
        });
      } catch(e) {}
      
      client.subscribe(topic, { 
        onSuccess: function() {
          console.log('📥 Inscrito no tópico:', topic);
        },
        onFailure: function(err) {
          console.warn('Falha ao inscrever no tópico', topic, err);
        }
      });
      currentTopic = topic;
    }

    // Publicar comando
    function publishCommand(command) {
      if (!client || !client.isConnected()) {
        setStatus('offline', 'Sem conexão');
        setButtonsEnabled(false);
        return;
      }
      const msg = new Paho.MQTT.Message(command);
      msg.destinationName = currentTopic;
      msg.qos = 1;
      client.send(msg);
      console.log(`📤 Comando "${command}" publicado em ${currentTopic}`);
    }

    // Eventos dos botões individuais
    leds.forEach((led, index) => {
      const ledNumber = index + 1;
      led.btnOn.addEventListener('click', function() {
        publishCommand(`LED${ledNumber}:1`);
      });
      led.btnOff.addEventListener('click', function() {
        publishCommand(`LED${ledNumber}:0`);
      });
    });

    // Eventos dos botões globais
    btnAllOn.addEventListener('click', function() {
      publishCommand('ALL:1');
    });
    btnAllOff.addEventListener('click', function() {
      publishCommand('ALL:0');
    });

    // Tópico - reassinar automaticamente
    topicInput.addEventListener('change', function() {
      const newTopic = this.value.trim();
      if (!newTopic) {
        this.value = currentTopic;
        return;
      }
      if (newTopic !== currentTopic) {
        currentTopic = newTopic;
        if (client && client.isConnected()) {
          doSubscribe(currentTopic);
        } else {
          console.log('🔄 Tópico atualizado (offline):', currentTopic);
        }
      }
    });

    topicInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        this.blur();
        const newTopic = this.value.trim();
        if (!newTopic) {
          this.value = currentTopic;
          return;
        }
        if (newTopic !== currentTopic) {
          currentTopic = newTopic;
          if (client && client.isConnected()) {
            doSubscribe(currentTopic);
          } else {
            console.log('🔄 Tópico atualizado (offline):', currentTopic);
          }
        }
      }
    });

    // Inicialização
    function init() {
      setStatus('waiting', 'Sincronizando...');
      setButtonsEnabled(false);
      leds.forEach((_, index) => {
        updateLedUI(index, 0);
      });
      connectMQTT();
    }

    init();

    // Reconexão automática quando voltar online
    window.addEventListener('online', function() {
      if (!isConnected) {
        connectMQTT();
      }
    });

  })();
</script>
</body>
</html>

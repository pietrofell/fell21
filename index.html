<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InovaNet Automação - Guia Visual</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 font-sans text-slate-800 min-h-screen flex flex-col">

    <header class="bg-slate-900 text-white py-6 px-4 shadow-md text-center">
        <h1 class="text-3xl font-extrabold tracking-wide text-cyan-400">InovaNet</h1>
        <p class="text-sm text-slate-400 mt-1">Guia Visual de Redes para Automação Industrial</p>
    </header>

    <nav class="max-w-4xl mx-auto w-full mt-8 px-4">
        <div class="flex border-b border-slate-300 gap-2">
            <button id="btn-cabos" onclick="mudarAba('cabos')" class="py-3 px-6 font-semibold text-lg transition-all duration-200 border-b-4 border-cyan-600 text-cyan-600 focus:outline-none">
                Cabos Industriais
            </button>
            <button id="btn-topologias" onclick="mudarAba('topologias')" class="py-3 px-6 font-semibold text-lg text-slate-500 hover:text-slate-800 transition-all duration-200 border-b-4 border-transparent focus:outline-none">
                Topologias
            </button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto w-full flex-grow p-4 mt-4">
        
        <section id="aba-cabos" class="block space-y-6">
            <p class="text-slate-600 italic">Clique em um dos cards abaixo para descobrir onde ele é essencial no chão de fábrica:</p>
            
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                <div onclick="exibirCabo('par-trancado')" class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 hover:border-cyan-500 hover:shadow-md cursor-pointer transition-all text-center group">
                    <div class="text-4xl mb-3 group-hover:scale-110 transition-transform">🔌</div>
                    <h3 class="text-lg font-bold text-slate-700">Par Trançado</h3>
                    <p class="text-xs text-slate-400 mt-1">O padrão das redes Ethernet</p>
                </div>

                <div onclick="exibirCabo('fibra')" class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 hover:border-cyan-500 hover:shadow-md cursor-pointer transition-all text-center group">
                    <div class="text-4xl mb-3 group-hover:scale-110 transition-transform">✨</div>
                    <h3 class="text-lg font-bold text-slate-700">Fibra Óptica</h3>
                    <p class="text-xs text-slate-400 mt-1">Velocidade da luz e imunidade</p>
                </div>

                <div onclick="exibirCabo('wireless')" class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 hover:border-cyan-500 hover:shadow-md cursor-pointer transition-all text-center group">
                    <div class="text-4xl mb-3 group-hover:scale-110 transition-transform">📡</div>
                    <h3 class="text-lg font-bold text-slate-700">Wireless</h3>
                    <p class="text-xs text-slate-400 mt-1">Conectividade sem amarras</p>
                </div>
            </div>

            <div id="painel-cabo" class="bg-cyan-50 border border-cyan-200 rounded-xl p-6 hidden transition-all">
                <h4 id="titulo-cabo" class="text-xl font-bold text-cyan-900 mb-2"></h4>
                <p id="texto-cabo" class="text-slate-700 leading-relaxed"></p>
            </div>
        </section>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guia Visual de Redes para Automação</title>
    <style>
        :root {
            --primary: #2b3a4a;
            --secondary: #007bff;
            --bg: #f4f6f9;
            --card-bg: #ffffff;
            --text: #333333;
            --accent: #28a745;
            --danger: #dc3545;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: var(--primary);
            color: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* Sistema de Abas */
        .tabs {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
            gap: 10px;
        }

        .tab-btn {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            background-color: #ddd;
            color: #555;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background-color: var(--secondary);
            color: white;
        }

        .tab-content {
            display: none;
            max-width: 1000px;
            margin: 0 auto;
        }

        .tab-content.active {
            display: block;
        }

        /* Grid de Cards (Aba 1) */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            cursor: pointer;
            border-top: 5px solid var(--secondary);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        .card h3 {
            margin-bottom: 15px;
            color: var(--primary);
        }

        .info-box {
            margin-top: 15px;
            padding: 12px;
            background: #e9ecef;
            border-left: 4px solid var(--secondary);
            border-radius: 4px;
            display: none;
            font-size: 14px;
        }

        /* Layout de Botões e Conteúdo (Aba 2) */
        .button-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .action-btn {
            padding: 10px 20px;
            font-size: 15px;
            cursor: pointer;
            border: 2px solid var(--primary);
            background: transparent;
            color: var(--primary);
            font-weight: 600;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .action-btn.active, .action-btn:hover {
            background: var(--primary);
            color: white;
        }

        .topo-details {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: none;
        }

        .topo-details h3 {
            color: var(--primary);
            margin-bottom: 10px;
        }

        .lists-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .pros-cons {
            padding: 15px;
            border-radius: 6px;
        }

        .pros { background: #e6f4ea; border-left: 4px solid var(--accent); }
        .cons { background: #fce8e6; border-left: 4px solid var(--danger); }

        .pros h4 { color: #137333; margin-bottom: 8px; }
        .cons h4 { color: #c5221f; margin-bottom: 8px; }

        ul { padding-left: 20px; font-size: 14px; }
        li { margin-bottom: 5px; }
    </style>
</head>
<body>

        <h1>Guia Visual de Redes para Automação</h1>
    </header>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Central de Iluminação IoT</title>
  <!-- Paho MQTT via CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
  <!-- Tailwind via CDN (para agilidade, com customizações) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Glassmorphism + refinamentos */
    body {
      background: linear-gradient(145deg, #d4e9ff 0%, #f0f8ff 100%);
      min-height: 100vh;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      margin: 0;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(14px) saturate(180%);
      -webkit-backdrop-filter: blur(14px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.7);
      box-shadow: 0 20px 40px -12px rgba(0, 20, 40, 0.25);
      transition: box-shadow 0.3s ease;
    }
    .glass-card:hover {
      box-shadow: 0 30px 50px -16px rgba(0, 40, 80, 0.3);
    }
    /* LED virtual com transições suaves */
    .led-circle {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: #b0c7db;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.06);
      transition: background 0.3s ease, box-shadow 0.4s ease, transform 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 400;
      letter-spacing: 0.3px;
      color: #2f4057;
      font-size: 0.85rem;
      margin: 0 auto;
      will-change: transform;
    }
    .led-on {
      background: #0a8cff;
      box-shadow: 0 0 30px #3b9eff, 0 0 60px #6eb5ff, 0 0 90px #a0d0ff;
      color: white;
      text-shadow: 0 0 8px rgba(255,255,255,0.6);
      animation: pulse-glow 2s infinite alternate;
    }
    @keyframes pulse-glow {
      0% { box-shadow: 0 0 18px #3b9eff, 0 0 40px #6eb5ff; }
      100% { box-shadow: 0 0 40px #6eb5ff, 0 0 80px #a0d0ff, 0 0 120px #c0e4ff; }
    }
    .led-off {
      background: #bdd3e6;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.08);
      color: #3a4d66;
    }
    /* Status pill com luz pulsante */
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 0.45rem 1.2rem 0.45rem 1rem;
      border-radius: 40px;
      background: rgba(255,255,255,0.3);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.5);
      font-size: 0.9rem;
      font-weight: 500;
      transition: all 0.2s;
    }
    .status-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      display: inline-block;
      transition: background 0.3s, box-shadow 0.3s;
    }
    .dot-waiting {
      background: #fbbf24;
      box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.7);
      animation: pulse-dot 1.4s infinite;
    }
    .dot-online {
      background: #10b981;
      box-shadow: 0 0 12px #34d399;
    }
    .dot-offline {
      background: #ef4444;
      box-shadow: 0 0 12px #f87171;
    }
    @keyframes pulse-dot {
      0% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.6); }
      70% { box-shadow: 0 0 0 10px rgba(251, 191, 36, 0); }
      100% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); }
    }
    /* inputs e botões refinados */
    .topic-input {
      background: rgba(255,255,255,0.5);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.8);
      border-radius: 40px;
      padding: 0.6rem 1.4rem;
      width: 100%;
      font-size: 0.95rem;
      transition: all 0.2s;
      color: #1e293b;
    }
    .topic-input:focus {
      outline: none;
      border-color: #94b8ff;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
      background: rgba(255,255,255,0.7);
    }
    .btn-action {
      padding: 0.75rem 2rem;
      border-radius: 48px;
      font-weight: 500;
      letter-spacing: 0.3px;
      transition: all 0.2s ease;
      border: none;
      background: #e2e8f0;
      color: #1e293b;
      box-shadow: 0 4px 10px rgba(0,0,0,0.02);
      flex: 1;
      min-width: 110px;
      text-align: center;
      cursor: pointer;
    }
    .btn-action:active {
      transform: scale(0.95);
    }
    .btn-action:disabled {
      opacity: 0.4;
      pointer-events: none;
      filter: grayscale(0.3);
    }
    .btn-on {
      background: #0b9e6e;
      color: white;
      box-shadow: 0 6px 16px rgba(16, 185, 129, 0.25);
    }
    .btn-on:hover:not(:disabled) {
      background: #0a8a5f;
      box-shadow: 0 8px 20px rgba(16, 185, 129, 0.35);
    }
    .btn-off {
      background: #d16b6b;
      color: white;
      box-shadow: 0 6px 16px rgba(209, 107, 107, 0.2);
    }
    .btn-off:hover:not(:disabled) {
      background: #bf5a5a;
      box-shadow: 0 8px 20px rgba(209, 107, 107, 0.3);
    }
    /* responsividade fina */
    @media (max-width: 480px) {
      .led-circle { width: 80px; height: 80px; font-size: 0.75rem; }
      .btn-action { padding: 0.6rem 1.2rem; min-width: 90px; }
    }
  </style>
</head>
<body>

<div class="w-full max-w-2xl mx-auto px-3">
  <!-- Glassmorphism card principal -->
  <div class="glass-card rounded-3xl p-6 md:p-8 w-full">
    
    <!-- Cabeçalho minimalista -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2 mb-5">
      <div>
        <h1 class="text-2xl md:text-3xl font-semibold text-[#0b2b44] tracking-tight flex items-center gap-2">
          <span>💡</span> Central de Iluminação IoT
        </h1>
        <p class="text-sm text-[#3a5a7a] font-light tracking-wide mt-0.5 flex items-center gap-1">
          <span class="opacity-70">⚡</span> Controle de Hardware – Porta 13
        </p>
      </div>
      <!-- Status Pill -->
      <div id="statusPill" class="status-pill self-start sm:self-center text-[#1f3a57]">
        <span id="statusDot" class="status-dot dot-waiting"></span>
        <span id="statusLabel" class="text-sm font-medium">Sincronizando...</span>
      </div>
    </div>

    <!-- Tópico interativo (input) -->
    <div class="mb-6">
      <label for="topicInput" class="block text-xs font-medium text-[#2d4b6e] uppercase tracking-wider mb-1.5 ml-1 opacity-80">Tópico MQTT</label>
      <input id="topicInput" type="text" value="gerry_sanchez_led_exclusivo/arduino" 
             class="topic-input text-[#1e293b] font-mono text-sm" spellcheck="false">
      <p class="text-[10px] text-[#4a6a8a] mt-1.5 ml-2 opacity-70">✎ Edite e pressione Enter para reassinar automaticamente</p>
    </div>

    <!-- Simulador do LED (pré-visualização) -->
    <div class="flex flex-col items-center justify-center py-4 px-2 mb-5">
      <div id="ledCircle" class="led-circle led-off">
        <span id="ledLabel" class="text-center px-2">Dispositivo Inativo</span>
      </div>
    </div>

    <!-- Botões de ação lado a lado -->
    <div class="flex flex-row flex-wrap items-center justify-center gap-3 sm:gap-4 mt-2">
      <button id="btnOn" class="btn-action btn-on" disabled>🔛 Ligar</button>
      <button id="btnOff" class="btn-action btn-off" disabled>⏻ Desligar</button>
    </div>

    <!-- rodapé discreto com info de conexão -->
    <div class="mt-6 text-center text-[10px] text-[#4d6e8f] opacity-50 tracking-wider font-light border-t border-white/30 pt-4">
      <span> broker.hivemq.com • WebSocket Secure </span>
    </div>
  </div>
</div>

<script>
  (function() {
    "use strict";

    // ---- DOM refs ----
    const statusDot = document.getElementById('statusDot');
    const statusLabel = document.getElementById('statusLabel');
    const ledCircle = document.getElementById('ledCircle');
    const ledLabel = document.getElementById('ledLabel');
    const btnOn = document.getElementById('btnOn');
    const btnOff = document.getElementById('btnOff');
    const topicInput = document.getElementById('topicInput');

    // ---- Estado ----
    let currentTopic = topicInput.value.trim() || 'gerry_sanchez_led_exclusivo/arduino';
    let client = null;
    let isConnected = false;
    let ledState = 0; // 0 = off, 1 = on

    // ---- Helpers UI ----
    function updateLedUI(state) {
      // state: 0 ou 1 (número)
      if (state === 1) {
        ledCircle.classList.remove('led-off');
        ledCircle.classList.add('led-on');
        ledLabel.textContent = 'Dispositivo Ativo';
      } else {
        ledCircle.classList.remove('led-on');
        ledCircle.classList.add('led-off');
        ledLabel.textContent = 'Dispositivo Inativo';
      }
      ledState = state;
    }

    function setStatus(mode, labelText) {
      // mode: 'waiting', 'online', 'offline'
      statusDot.className = 'status-dot';
      if (mode === 'waiting') {
        statusDot.classList.add('dot-waiting');
        statusLabel.textContent = labelText || 'Sincronizando...';
      } else if (mode === 'online') {
        statusDot.classList.add('dot-online');
        statusLabel.textContent = labelText || 'Sistema Online';
      } else if (mode === 'offline') {
        statusDot.classList.add('dot-offline');
        statusLabel.textContent = labelText || 'Desconectado';
      }
    }

    function setButtonsEnabled(enabled) {
      if (enabled) {
        btnOn.disabled = false;
        btnOff.disabled = false;
      } else {
        btnOn.disabled = true;
        btnOff.disabled = true;
      }
    }

    // ---- MQTT ----
    function connectMQTT() {
      if (client && client.isConnected()) {
        client.disconnect();
      }

      const clientId = 'web_' + Math.random().toString(16).substr(2, 8) + '_' + Date.now();
      client = new Paho.MQTT.Client('broker.hivemq.com', Number(8884), clientId);

      // Callbacks
      client.onConnectionLost = function(response) {
        isConnected = false;
        setStatus('offline', 'Conexão perdida');
        setButtonsEnabled(false);
        console.warn('MQTT connection lost:', response.errorCode, response.errorMessage);
        // Tentar reconectar após 4s
        setTimeout(() => {
          if (!isConnected) {
            connectMQTT();
          }
        }, 4000);
      };

      client.onMessageArrived = function(message) {
        const payload = message.payloadString.trim();
        console.log('📥 Mensagem recebida no tópico', message.destinationName, '=>', payload);
        // Atualiza o LED SOMENTE aqui (regra de ouro)
        if (payload === '1') {
          updateLedUI(1);
        } else if (payload === '0') {
          updateLedUI(0);
        } else {
          // Ignora outros valores
        }
      };

      const connectOptions = {
        useSSL: true,
        timeout: 10,
        onSuccess: function() {
          isConnected = true;
          setStatus('online', 'Sistema Online');
          setButtonsEnabled(true);
          // Assina o tópico atual
          doSubscribe(currentTopic);
          console.log('✅ Conectado ao broker, clientId:', clientId);
        },
        onFailure: function(err) {
          isConnected = false;
          setStatus('offline', 'Falha na conexão');
          setButtonsEnabled(false);
          console.error('❌ Falha ao conectar:', err.errorMessage);
          // tenta novamente após 5s
          setTimeout(connectMQTT, 5000);
        }
      };

      client.connect(connectOptions);
    }

    function doSubscribe(topic) {
      if (!client || !client.isConnected()) return;
      try {
        client.unsubscribe(currentTopic, { onSuccess: function() {
          console.log('📤 Desinscrito do tópico:', currentTopic);
        }});
      } catch(e) {}
      
      client.subscribe(topic, { 
        onSuccess: function() {
          console.log('📥 Inscrito no tópico:', topic);
          // Publica uma requisição de estado? Não obrigatório, mas podemos pedir estado atual (mas o broker não guarda)
          // Para fins didáticos, não fazemos publish automático para não poluir.
        },
        onFailure: function(err) {
          console.warn('Falha ao inscrever no tópico', topic, err);
        }
      });
      currentTopic = topic;
    }

    // ---- Publicar comando ----
    function publishCommand(value) {
      if (!client || !client.isConnected()) {
        setStatus('offline', 'Sem conexão');
        setButtonsEnabled(false);
        return;
      }
      const topic = currentTopic;
      const payload = String(value);
      const msg = new Paho.MQTT.Message(payload);
      msg.destinationName = topic;
      msg.qos = 1;
      client.send(msg);
      console.log(`📤 Comando ${payload} publicado em ${topic}`);
      // Não alteramos o LED aqui (regra de ouro)
    }

    // ---- Eventos dos botões ----
    btnOn.addEventListener('click', function() {
      publishCommand(1);
    });
    btnOff.addEventListener('click', function() {
      publishCommand(0);
    });

    // ---- Input de tópico: ao mudar, reassina ----
    topicInput.addEventListener('change', function() {
      const newTopic = this.value.trim();
      if (!newTopic) {
        this.value = currentTopic;
        return;
      }
      if (newTopic !== currentTopic) {
        currentTopic = newTopic;
        if (client && client.isConnected()) {
          doSubscribe(currentTopic);
        } else {
          // se não estiver conectado, apenas guarda o tópico
          console.log('🔄 Tópico atualizado (offline):', currentTopic);
        }
      }
    });

    // Também ao pressionar Enter (para melhor UX)
    topicInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        this.blur();
        const newTopic = this.value.trim();
        if (!newTopic) {
          this.value = currentTopic;
          return;
        }
        if (newTopic !== currentTopic) {
          currentTopic = newTopic;
          if (client && client.isConnected()) {
            doSubscribe(currentTopic);
          } else {
            console.log('🔄 Tópico atualizado (offline):', currentTopic);
          }
        }
      }
    });

    // ---- Inicialização ----
    function init() {
      setStatus('waiting', 'Sincronizando...');
      setButtonsEnabled(false);
      updateLedUI(0); // inicia desligado
      connectMQTT();
    }

    init();

    // ---- (opcional) reconexão manual se perder ----
    window.addEventListener('online', function() {
      if (!isConnected) {
        connectMQTT();
      }
    });

  })();
</script>
</body>
</html>

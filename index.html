<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Central de Iluminação IoT - 3 LEDs</title>
  <!-- Paho MQTT via CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
  <!-- Tailwind via CDN (para agilidade, com customizações) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Glassmorphism + refinamentos */
    body {
      background: linear-gradient(145deg, #d4e9ff 0%, #f0f8ff 100%);
      min-height: 100vh;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      margin: 0;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(14px) saturate(180%);
      -webkit-backdrop-filter: blur(14px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.7);
      box-shadow: 0 20px 40px -12px rgba(0, 20, 40, 0.25);
      transition: box-shadow 0.3s ease;
    }
    .glass-card:hover {
      box-shadow: 0 30px 50px -16px rgba(0, 40, 80, 0.3);
    }
    /* LED virtual com transições suaves */
    .led-circle {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: #b0c7db;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.06);
      transition: background 0.3s ease, box-shadow 0.4s ease, transform 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 400;
      letter-spacing: 0.3px;
      color: #2f4057;
      font-size: 0.7rem;
      margin: 0 auto;
      will-change: transform;
    }
    .led-on {
      background: #0a8cff;
      box-shadow: 0 0 30px #3b9eff, 0 0 60px #6eb5ff, 0 0 90px #a0d0ff;
      color: white;
      text-shadow: 0 0 8px rgba(255,255,255,0.6);
      animation: pulse-glow 2s infinite alternate;
    }
    @keyframes pulse-glow {
      0% { box-shadow: 0 0 18px #3b9eff, 0 0 40px #6eb5ff; }
      100% { box-shadow: 0 0 40px #6eb5ff, 0 0 80px #a0d0ff, 0 0 120px #c0e4ff; }
    }
    .led-off {
      background: #bdd3e6;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.08);
      color: #3a4d66;
    }
    /* Status pill com luz pulsante */
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 0.45rem 1.2rem 0.45rem 1rem;
      border-radius: 40px;
      background: rgba(255,255,255,0.3);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.5);
      font-size: 0.9rem;
      font-weight: 500;
      transition: all 0.2s;
    }
    .status-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      display: inline-block;
      transition: background 0.3s, box-shadow 0.3s;
    }
    .dot-waiting {
      background: #fbbf24;
      box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.7);
      animation: pulse-dot 1.4s infinite;
    }
    .dot-online {
      background: #10b981;
      box-shadow: 0 0 12px #34d399;
    }
    .dot-offline {
      background: #ef4444;
      box-shadow: 0 0 12px #f87171;
    }
    @keyframes pulse-dot {
      0% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.6); }
      70% { box-shadow: 0 0 0 10px rgba(251, 191, 36, 0); }
      100% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); }
    }
    /* inputs e botões refinados */
    .topic-input {
      background: rgba(255,255,255,0.5);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.8);
      border-radius: 40px;
      padding: 0.6rem 1.4rem;
      width: 100%;
      font-size: 0.95rem;
      transition: all 0.2s;
      color: #1e293b;
    }
    .topic-input:focus {
      outline: none;
      border-color: #94b8ff;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
      background: rgba(255,255,255,0.7);
    }
    .btn-action {
      padding: 0.6rem 1.2rem;
      border-radius: 48px;
      font-weight: 500;
      letter-spacing: 0.3px;
      transition: all 0.2s ease;
      border: none;
      background: #e2e8f0;
      color: #1e293b;
      box-shadow: 0 4px 10px rgba(0,0,0,0.02);
      flex: 1;
      min-width: 80px;
      text-align: center;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .btn-action:active {
      transform: scale(0.95);
    }
    .btn-action:disabled {
      opacity: 0.4;
      pointer-events: none;
      filter: grayscale(0.3);
    }
    .btn-on {
      background: #0b9e6e;
      color: white;
      box-shadow: 0 6px 16px rgba(16, 185, 129, 0.25);
    }
    .btn-on:hover:not(:disabled) {
      background: #0a8a5f;
      box-shadow: 0 8px 20px rgba(16, 185, 129, 0.35);
    }
    .btn-off {
      background: #d16b6b;
      color: white;
      box-shadow: 0 6px 16px rgba(209, 107, 107, 0.2);
    }
    .btn-off:hover:not(:disabled) {
      background: #bf5a5a;
      box-shadow: 0 8px 20px rgba(209, 107, 107, 0.3);
    }
    /* responsividade fina */
    @media (max-width: 480px) {
      .led-circle { width: 60px; height: 60px; font-size: 0.6rem; }
      .btn-action { padding: 0.5rem 0.8rem; min-width: 70px; font-size: 0.75rem; }
    }
  </style>
</head>
<body>

<div class="w-full max-w-3xl mx-auto px-3">
  <!-- Glassmorphism card principal -->
  <div class="glass-card rounded-3xl p-6 md:p-8 w-full">
    
    <!-- Cabeçalho minimalista -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2 mb-5">
      <div>
        <h1 class="text-2xl md:text-3xl font-semibold text-[#0b2b44] tracking-tight flex items-center gap-2">
          <span>💡</span> Central de Iluminação IoT
        </h1>
        <p class="text-sm text-[#3a5a7a] font-light tracking-wide mt-0.5 flex items-center gap-1">
          <span class="opacity-70">⚡</span> Controle de Hardware – 3 LEDs
        </p>
      </div>
      <!-- Status Pill -->
      <div id="statusPill" class="status-pill self-start sm:self-center text-[#1f3a57]">
        <span id="statusDot" class="status-dot dot-waiting"></span>
        <span id="statusLabel" class="text-sm font-medium">Sincronizando...</span>
      </div>
    </div>

    <!-- Tópico interativo (input) -->
    <div class="mb-6">
      <label for="topicInput" class="block text-xs font-medium text-[#2d4b6e] uppercase tracking-wider mb-1.5 ml-1 opacity-80">Tópico MQTT</label>
      <input id="topicInput" type="text" value="gerry_sanchez_led_exclusivo/arduino" 
             class="topic-input text-[#1e293b] font-mono text-sm" spellcheck="false">
      <p class="text-[10px] text-[#4a6a8a] mt-1.5 ml-2 opacity-70">✎ Edite e pressione Enter para reassinar automaticamente</p>
    </div>

    <!-- LEDs de controle (3 LEDs) -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
      <!-- LED 1 -->
      <div class="flex flex-col items-center p-4 bg-white/20 rounded-2xl backdrop-blur-sm border border-white/30">
        <div class="text-sm font-medium text-[#1f3a57] mb-2">LED 1</div>
        <div id="ledCircle1" class="led-circle led-off">
          <span id="ledLabel1" class="text-center px-1">Inativo</span>
        </div>
        <div class="flex gap-2 mt-3 w-full">
          <button id="btnOn1" class="btn-action btn-on" disabled>🔛 Ligar</button>
          <button id="btnOff1" class="btn-action btn-off" disabled>⏻ Desl.</button>
        </div>
      </div>

      <!-- LED 2 -->
      <div class="flex flex-col items-center p-4 bg-white/20 rounded-2xl backdrop-blur-sm border border-white/30">
        <div class="text-sm font-medium text-[#1f3a57] mb-2">LED 2</div>
        <div id="ledCircle2" class="led-circle led-off">
          <span id="ledLabel2" class="text-center px-1">Inativo</span>
        </div>
        <div class="flex gap-2 mt-3 w-full">
          <button id="btnOn2" class="btn-action btn-on" disabled>🔛 Ligar</button>
          <button id="btnOff2" class="btn-action btn-off" disabled>⏻ Desl.</button>
        </div>
      </div>

      <!-- LED 3 -->
      <div class="flex flex-col items-center p-4 bg-white/20 rounded-2xl backdrop-blur-sm border border-white/30">
        <div class="text-sm font-medium text-[#1f3a57] mb-2">LED 3</div>
        <div id="ledCircle3" class="led-circle led-off">
          <span id="ledLabel3" class="text-center px-1">Inativo</span>
        </div>
        <div class="flex gap-2 mt-3 w-full">
          <button id="btnOn3" class="btn-action btn-on" disabled>🔛 Ligar</button>
          <button id="btnOff3" class="btn-action btn-off" disabled>⏻ Desl.</button>
        </div>
      </div>
    </div>

    <!-- Controles globais -->
    <div class="flex flex-row flex-wrap items-center justify-center gap-3 sm:gap-4 mt-2">
      <button id="btnAllOn" class="btn-action btn-on" disabled>🔛 Ligar Todos</button>
      <button id="btnAllOff" class="btn-action btn-off" disabled>⏻ Desligar Todos</button>
    </div>

    <!-- rodapé discreto com info de conexão -->
    <div class="mt-6 text-center text-[10px] text-[#4d6e8f] opacity-50 tracking-wider font-light border-t border-white/30 pt-4">
      <span> broker.hivemq.com • WebSocket Secure </span>
    </div>
  </div>
</div>

<script>
  (function() {
    "use strict";

    // ---- DOM refs ----
    const statusDot = document.getElementById('statusDot');
    const statusLabel = document.getElementById('statusLabel');
    const topicInput = document.getElementById('topicInput');

    // Configuração dos LEDs
    const leds = [
      {
        id: 1,
        circle: document.getElementById('ledCircle1'),
        label: document.getElementById('ledLabel1'),
        btnOn: document.getElementById('btnOn1'),
        btnOff: document.getElementById('btnOff1'),
        state: 0
      },
      {
        id: 2,
        circle: document.getElementById('ledCircle2'),
        label: document.getElementById('ledLabel2'),
        btnOn: document.getElementById('btnOn2'),
        btnOff: document.getElementById('btnOff2'),
        state: 0
      },
      {
        id: 3,
        circle: document.getElementById('ledCircle3'),
        label: document.getElementById('ledLabel3'),
        btnOn: document.getElementById('btnOn3'),
        btnOff: document.getElementById('btnOff3'),
        state: 0
      }
    ];

    const btnAllOn = document.getElementById('btnAllOn');
    const btnAllOff = document.getElementById('btnAllOff');

    // ---- Estado ----
    let currentTopic = topicInput.value.trim() || 'gerry_sanchez_led_exclusivo/arduino';
    let client = null;
    let isConnected = false;

    // ---- Helpers UI ----
    function updateLedUI(ledIndex, state) {
      // state: 0 ou 1 (número)
      const led = leds[ledIndex];
      if (state === 1) {
        led.circle.classList.remove('led-off');
        led.circle.classList.add('led-on');
        led.label.textContent = `LED ${led.id} Ativo`;
      } else {
        led.circle.classList.remove('led-on');
        led.circle.classList.add('led-off');
        led.label.textContent = `LED ${led.id} Inativo`;
      }
      led.state = state;
    }

    function setStatus(mode, labelText) {
      statusDot.className = 'status-dot';
      if (mode === 'waiting') {
        statusDot.classList.add('dot-waiting');
        statusLabel.textContent = labelText || 'Sincronizando...';
      } else if (mode === 'online') {
        statusDot.classList.add('dot-online');
        statusLabel.textContent = labelText || 'Sistema Online';
      } else if (mode === 'offline') {
        statusDot.classList.add('dot-offline');
        statusLabel.textContent = labelText || 'Desconectado';
      }
    }

    function setButtonsEnabled(enabled) {
      leds.forEach(led => {
        led.btnOn.disabled = !enabled;
        led.btnOff.disabled = !enabled;
      });
      btnAllOn.disabled = !enabled;
      btnAllOff.disabled = !enabled;
    }

    // ---- MQTT ----
    function connectMQTT() {
      if (client && client.isConnected()) {
        client.disconnect();
      }

      const clientId = 'web_' + Math.random().toString(16).substr(2, 8) + '_' + Date.now();
      client = new Paho.MQTT.Client('broker.hivemq.com', Number(8884), clientId);

      client.onConnectionLost = function(response) {
        isConnected = false;
        setStatus('offline', 'Conexão perdida');
        setButtonsEnabled(false);
        console.warn('MQTT connection lost:', response.errorCode, response.errorMessage);
        setTimeout(() => {
          if (!isConnected) {
            connectMQTT();
          }
        }, 4000);
      };

      client.onMessageArrived = function(message) {
        const payload = message.payloadString.trim();
        const topic = message.destinationName;
        console.log(`📥 Mensagem recebida no tópico ${topic}: ${payload}`);
        
        // Formato esperado: "LEDx:1" ou "LEDx:0" ou "ALL:1" ou "ALL:0"
        const parts = payload.split(':');
        if (parts.length === 2) {
          const target = parts[0].toUpperCase();
          const value = parseInt(parts[1]);
          
          if (target === 'LED1' && !isNaN(value)) {
            updateLedUI(0, value);
          } else if (target === 'LED2' && !isNaN(value)) {
            updateLedUI(1, value);
          } else if (target === 'LED3' && !isNaN(value)) {
            updateLedUI(2, value);
          } else if (target === 'ALL' && !isNaN(value)) {
            // Atualiza todos os LEDs
            leds.forEach((led, index) => {
              updateLedUI(index, value);
            });
          }
        }
      };

      const connectOptions = {
        useSSL: true,
        timeout: 10,
        onSuccess: function() {
          isConnected = true;
          setStatus('online', 'Sistema Online');
          setButtonsEnabled(true);
          doSubscribe(currentTopic);
          console.log('✅ Conectado ao broker, clientId:', clientId);
        },
        onFailure: function(err) {
          isConnected = false;
          setStatus('offline', 'Falha na conexão');
          setButtonsEnabled(false);
          console.error('❌ Falha ao conectar:', err.errorMessage);
          setTimeout(connectMQTT, 5000);
        }
      };

      client.connect(connectOptions);
    }

    function doSubscribe(topic) {
      if (!client || !client.isConnected()) return;
      try {
        client.unsubscribe(currentTopic, { onSuccess: function() {
          console.log('📤 Desinscrito do tópico:', currentTopic);
        }});
      } catch(e) {}
      
      client.subscribe(topic, { 
        onSuccess: function() {
          console.log('📥 Inscrito no tópico:', topic);
        },
        onFailure: function(err) {
          console.warn('Falha ao inscrever no tópico', topic, err);
        }
      });
      currentTopic = topic;
    }

    // ---- Publicar comando ----
    function publishCommand(command) {
      if (!client || !client.isConnected()) {
        setStatus('offline', 'Sem conexão');
        setButtonsEnabled(false);
        return;
      }
      const topic = currentTopic;
      const msg = new Paho.MQTT.Message(command);
      msg.destinationName = topic;
      msg.qos = 1;
      client.send(msg);
      console.log(`📤 Comando "${command}" publicado em ${topic}`);
    }

    // ---- Eventos dos botões individuais ----
    leds.forEach((led, index) => {
      const ledNumber = index + 1;
      led.btnOn.addEventListener('click', function() {
        publishCommand(`LED${ledNumber}:1`);
      });
      led.btnOff.addEventListener('click', function() {
        publishCommand(`LED${ledNumber}:0`);
      });
    });

    // ---- Eventos dos botões globais ----
    btnAllOn.addEventListener('click', function() {
      publishCommand('ALL:1');
    });
    btnAllOff.addEventListener('click', function() {
      publishCommand('ALL:0');
    });

    // ---- Input de tópico: ao mudar, reassina ----
    topicInput.addEventListener('change', function() {
      const newTopic = this.value.trim();
      if (!newTopic) {
        this.value = currentTopic;
        return;
      }
      if (newTopic !== currentTopic) {
        currentTopic = newTopic;
        if (client && client.isConnected()) {
          doSubscribe(currentTopic);
        } else {
          console.log('🔄 Tópico atualizado (offline):', currentTopic);
        }
      }
    });

    topicInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        this.blur();
        const newTopic = this.value.trim();
        if (!newTopic) {
          this.value = currentTopic;
          return;
        }
        if (newTopic !== currentTopic) {
          currentTopic = newTopic;
          if (client && client.isConnected()) {
            doSubscribe(currentTopic);
          } else {
            console.log('🔄 Tópico atualizado (offline):', currentTopic);
          }
        }
      }
    });

    // ---- Inicialização ----
    function init() {
      setStatus('waiting', 'Sincronizando...');
      setButtonsEnabled(false);
      // Inicia todos os LEDs desligados
      leds.forEach((led, index) => {
        updateLedUI(index, 0);
      });
      connectMQTT();
    }

    init();

    window.addEventListener('online', function() {
      if (!isConnected) {
        connectMQTT();
      }
    });

  })();
</script>
</body>
</html>
